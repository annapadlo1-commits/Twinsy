<!doctype html><html lang="pl"><head><base target="_top"><style>
:root{--ink:#221f1d;--muted:#706a65;--line:#e6e0db;--bg:#f7f4f1;--accent:#7f3f5f;--ok:#226c4a;--danger:#a33434}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px system-ui,-apple-system,sans-serif}.app{max-width:720px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.top h1{font-size:22px;margin:0}.user{font-size:12px;color:var(--muted)}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.tabs button,.primary,.secondary{border:0;border-radius:12px;padding:13px;font-weight:700}.tabs button{background:#fff;color:var(--ink)}.tabs button.active,.primary{background:var(--accent);color:#fff}.secondary{background:#ece5e8;color:var(--accent)}.panel{display:none}.panel.active{display:block}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}label{display:block;font-size:12px;font-weight:700;margin:4px 0}input,select,textarea{width:100%;border:1px solid #ccc3bc;border-radius:10px;padding:11px;background:#fff;font:inherit}textarea{min-height:76px;resize:vertical}.product{cursor:pointer}.product.selected{border:2px solid var(--accent)}.product h3{margin:0 0 6px;font-size:17px}.meta{color:var(--muted);font-size:13px}.price{font-size:18px;font-weight:800;margin-top:7px}.warning{color:var(--danger);font-weight:700}.success{color:var(--ok);font-weight:700}.message{min-height:22px;margin:8px 2px}.loading{opacity:.55;pointer-events:none}@media(max-width:520px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.app{padding:12px}}
</style></head><body><main class="app" id="app"><div class="top"><h1>Vintage PRO</h1><div class="user" id="user">Ładowanie…</div></div>
<div class="tabs" style="grid-template-columns:1fr 1fr 1fr"><button class="active" data-tab="sale">Sprzedaj</button><button data-tab="quick">Szybka sprzedaż</button><button data-tab="add">Dodaj produkt</button></div>
<section id="sale" class="panel active"><div class="card grid"><div><label>Sklep</label><select id="saleStore"><option>Oba sklepy</option></select></div><div><label>Szukaj po nazwie lub metadanych</label><input id="query" placeholder="np. sukienka jedwabna WN"></div></div><div id="results"></div>
<div class="card grid" id="saleForm" hidden><div class="full"><strong id="chosen"></strong></div><div><label>Cena z metki</label><input id="tagPrice" disabled></div><div><label>Cena sprzedaży</label><input id="finalPrice" inputmode="decimal"></div><div><label>Rabat</label><select id="discountType"></select></div><div><label>Forma płatności</label><select id="payment"></select></div><div><label>Kanał</label><select id="channel"><option>Sklep stacjonarny</option><option>Targi</option></select></div><div><label>ID targów (dla targów)</label><input id="eventId"></div><div class="full"><label>Zdjęcie produktu (opcjonalnie)</label><input type="file" id="salePhoto" accept="image/*" capture="environment"></div><div class="full"><label>Komentarz</label><textarea id="saleComment"></textarea></div><button class="primary full" id="sellBtn">Zatwierdź sprzedaż</button></div><div class="message" id="saleMsg"></div></section>
<section id="quick" class="panel"><div class="card"><strong>Produkt nie jest jeszcze w bazie</strong><div class="meta">Aplikacja utworzy kartę produktu, nada ID i od razu zapisze sprzedaż.</div></div><div class="card grid"><div><label>Sklep *</label><select id="qStore"></select></div><div><label>Nazwa z metki *</label><input id="qName"></div><div><label>Marka</label><input id="qBrand"></div><div><label>Kategoria *</label><select id="qCategory"></select></div><div><label>Materiał</label><input id="qMaterials"></div><div><label>Stan</label><select id="qCondition"></select></div><div><label>Cena z metki *</label><input id="qTagPrice" inputmode="decimal"></div><div><label>Cena sprzedaży *</label><input id="qFinalPrice" inputmode="decimal"></div><div><label>Rabat</label><select id="qDiscount"></select></div><div><label>Forma płatności *</label><select id="qPayment"></select></div><div><label>Kanał</label><select id="qChannel"><option>Sklep stacjonarny</option><option>Targi</option></select></div><div><label>ID targów</label><input id="qEventId"></div><div class="full"><label>Zrób zdjęcie (opcjonalnie)</label><input type="file" id="qPhoto" accept="image/*" capture="environment"></div><div class="full"><label>Komentarz</label><textarea id="qComment"></textarea></div><button class="primary full" id="quickBtn">Dodaj i sprzedaj</button></div><div class="message" id="quickMsg"></div></section>
<section id="add" class="panel"><div class="card grid"><div><label>Sklep *</label><select id="store"></select></div><div><label>Nazwa z metki *</label><input id="name"></div><div><label>Marka</label><input id="brand"></div><div><label>Kategoria *</label><select id="category"></select></div><div><label>Pochodzenie</label><select id="origin"></select></div><div><label>Styl / epoka</label><select id="style"></select></div><div><label>Materiały</label><input id="materials" placeholder="np. jedwab, wiskoza"></div><div><label>Stan produktu</label><select id="condition"></select></div><div><label>Cena z metki *</label><input id="newTagPrice" inputmode="decimal"></div><div><label>Koszt zakupu</label><input id="purchaseCost" inputmode="decimal"></div><div><label>Status kosztu</label><select id="costStatus"></select></div><div><label>Rozmiar</label><input id="size"></div><div><label>Kolor</label><input id="color"></div><div><label><input type="checkbox" id="hasDefect" style="width:auto"> Produkt ma wadę</label></div><div><label>Rodzaj wady</label><select id="defectType"></select></div><div class="full"><label>Opis wady</label><textarea id="defectDescription"></textarea></div><div class="full"><label>Zrób zdjęcie (opcjonalnie)</label><input type="file" id="newPhoto" accept="image/*" capture="environment"></div><div class="full"><label>Komentarz</label><textarea id="comment"></textarea></div><div><label><input type="checkbox" id="important" style="width:auto"> Ważna uwaga</label></div><button class="primary full" id="addBtn">Dodaj produkt</button></div><div class="message" id="addMsg"></div></section></main>
<script>
let boot,selected=null,timer;const $=id=>document.getElementById(id);document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('.panel').forEach(x=>x.classList.toggle('active',x.id===b.dataset.tab))});
function options(id,vals,blank=true){$(id).innerHTML=(blank?'<option value="">— wybierz —</option>':'')+vals.map(v=>`<option>${esc(v)}</option>`).join('')}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fail(id,e){$(id).textContent=e.message||e;$(id).className='message warning';$('app').classList.remove('loading')}
function ok(id,m){$(id).textContent=m;$(id).className='message success';$('app').classList.remove('loading')}
google.script.run.withSuccessHandler(d=>{boot=d;$('user').textContent=d.user;options('store',d.stores,false);options('qStore',d.stores,false);options('saleStore',['Oba sklepy',...d.stores],false);options('category',d.categories);options('qCategory',d.categories);options('origin',d.origins);options('style',d.styles);options('condition',d.conditions);options('qCondition',d.conditions);options('defectType',d.defects);options('costStatus',d.costStatuses);options('discountType',d.discounts);options('qDiscount',d.discounts);options('payment',d.payments);options('qPayment',d.payments);$('app').classList.remove('loading')}).withFailureHandler(e=>fail('saleMsg',e)).getBootstrapData();
$('query').oninput=()=>{clearTimeout(timer);timer=setTimeout(search,250)};$('saleStore').onchange=search;
function search(){const q=$('query').value.trim();if(q.length<2){$('results').innerHTML='';return}google.script.run.withSuccessHandler(render).withFailureHandler(e=>fail('saleMsg',e)).searchProducts(q,$('saleStore').value)}
function render(items){$('results').innerHTML=items.length?items.map(p=>`<article class="card product" data-id="${esc(p.id)}"><h3>${esc(p.name)}</h3><div class="meta">${esc([p.id,p.store,p.brand,p.category,p.style,p.materials,p.size,p.color,p.condition].filter(Boolean).join(' · '))}</div>${p.hasDefect?`<div class="warning">Wada: ${esc(p.defect||'sprawdź komentarz')}</div>`:''}${p.important?`<div class="warning">${esc(p.comment||'Ważna uwaga')}</div>`:''}<div class="price">${Number(p.tagPrice||0).toFixed(2)} zł</div></article>`).join(''):'<div class="card">Brak pasujących dostępnych produktów.</div>';document.querySelectorAll('.product').forEach(el=>el.onclick=()=>choose(items.find(p=>p.id===el.dataset.id),el))}
function choose(p,el){selected=p;document.querySelectorAll('.product').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');$('saleForm').hidden=false;$('chosen').textContent=`${p.name} · ${p.id}`;$('tagPrice').value=Number(p.tagPrice||0).toFixed(2);$('finalPrice').value=Number(p.tagPrice||0).toFixed(2);$('channel').value=p.status==='Na targach'?'Targi':'Sklep stacjonarny';$('eventId').value=p.eventId||''}
async function imageData(id){const f=$(id).files&&$(id).files[0];if(!f)return '';const bmp=await createImageBitmap(f);const max=1400,scale=Math.min(1,max/Math.max(bmp.width,bmp.height));const c=document.createElement('canvas');c.width=Math.round(bmp.width*scale);c.height=Math.round(bmp.height*scale);c.getContext('2d').drawImage(bmp,0,0,c.width,c.height);return c.toDataURL('image/jpeg',.78)}
$('sellBtn').onclick=async()=>{if(!selected)return;$('app').classList.add('loading');const imageDataUrl=await imageData('salePhoto');google.script.run.withSuccessHandler(r=>{ok('saleMsg',r.message);selected=null;$('saleForm').hidden=true;$('query').value='';$('results').innerHTML=''}).withFailureHandler(e=>fail('saleMsg',e)).sellProduct({productId:selected.id,finalPrice:$('finalPrice').value,discountType:$('discountType').value,payment:$('payment').value,channel:$('channel').value,eventId:$('eventId').value,comment:$('saleComment').value,imageDataUrl})};
$('addBtn').onclick=async()=>{$('app').classList.add('loading');const imageDataUrl=await imageData('newPhoto');google.script.run.withSuccessHandler(r=>{ok('addMsg',r.message);['name','brand','materials','newTagPrice','purchaseCost','size','color','defectDescription','comment'].forEach(id=>$(id).value='');$('hasDefect').checked=$('important').checked=false;$('newPhoto').value=''}).withFailureHandler(e=>fail('addMsg',e)).addProduct({store:$('store').value,name:$('name').value,brand:$('brand').value,category:$('category').value,origin:$('origin').value,style:$('style').value,materials:$('materials').value,condition:$('condition').value,tagPrice:$('newTagPrice').value,purchaseCost:$('purchaseCost').value,costStatus:$('costStatus').value,size:$('size').value,color:$('color').value,hasDefect:$('hasDefect').checked,defectType:$('defectType').value,defectDescription:$('defectDescription').value,comment:$('comment').value,important:$('important').checked,imageDataUrl})};
$('quickBtn').onclick=async()=>{$('app').classList.add('loading');const imageDataUrl=await imageData('qPhoto');google.script.run.withSuccessHandler(r=>{ok('quickMsg',r.message);['qName','qBrand','qMaterials','qTagPrice','qFinalPrice','qEventId','qComment'].forEach(id=>$(id).value='');$('qPhoto').value=''}).withFailureHandler(e=>fail('quickMsg',e)).quickSellProduct({store:$('qStore').value,name:$('qName').value,brand:$('qBrand').value,category:$('qCategory').value,materials:$('qMaterials').value,condition:$('qCondition').value,tagPrice:$('qTagPrice').value,finalPrice:$('qFinalPrice').value,discountType:$('qDiscount').value,payment:$('qPayment').value,channel:$('qChannel').value,eventId:$('qEventId').value,productComment:$('qComment').value,saleComment:$('qComment').value,imageDataUrl})};
</script></body></html>
